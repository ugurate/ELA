<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ela ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffc0cb,#ffe4ec);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:rgba(255,255,255,.35);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
max-width:600px;
width:90%;
}

h1{
font-size:55px;
color:#ff2d55;
margin-bottom:15px;
}

p{
font-size:20px;
color:#444;
margin:15px 0;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff2d55;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}
  .galeri{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.galeri img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid #ff69b4;
    box-shadow:0 0 15px rgba(255,105,180,0.5);
    transition:0.3s;
}

.galeri img:hover{
    transform:scale(1.08);
}

footer{
    margin-top:40px;
    padding:20px;
    text-align:center;
    color:#ff4d88;
    font-size:20px;
}
  .kalp{
    position:fixed;
    top:-30px;
    font-size:22px;
    animation:kalpdus 6s linear;
    pointer-events:none;
    z-index:9999;
}

@keyframes kalpdus{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>

</head>
<script>
setInterval(function(){

    const kalp = document.createElement("div");

    kalp.className = "kalp";
    kalp.innerHTML = "❤️";
    kalp.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(kalp);

    setTimeout(function(){
        kalp.remove();
    }, 6000);

}, 700);
</script>
  <script>
function kalbeBas() {
    document.getElementById("card").innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
            <img src="pisman.jpg" style="max-width:90%;border-radius:20px;box-shadow:0 0 25px rgba(255,0,100,.4);">
        </div>
    `;
}
</script>
<body>

<div class="card" id="card">

<h1>❤️ Ela ❤️</h1>
<img src="ela.jpg" alt="Ela"
style="
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:5px solid #ff7aa2;
box-shadow:0 0 25px rgba(255,105,180,.5);
margin:20px 0;
">
<p>Bu sayfa sadece senin için hazırlandı...</p>

<button onclick="document.getElementById('mektup').style.display='block';document.getElementById('devam').style.display='block'">
💌 Mektubu Aç
</button>

<div id="mektup" style="display:none; margin-top:20px; background:#fff0f5; padding:20px; border-radius:20px; box-shadow:0 0 15px rgba(255,105,180,.4);">

<h2>💌 Sana Mektubum</h2>

<p>
Sadece seni seviyorum.<br><br>
Kalbimde başka kimse yok.<br><br>
 ❤️
</p>

<footer>
    ❤️ Sonsuza Kadar ❤️
    <br>
    Seni her zaman seveceğim.
</footer>
  <audio autoplay loop controls>
    <source src="AUD-20260715-WA0013.aac" type="audio/aac">
    Tarayıcınız ses dosyasını desteklemiyor.
</audio>
  <br><br>

<button onclick="kalbeBas()" class="btn">
    ❤️ Kalbe Bas ❤️
</button>
</body>
</html>
