<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ela ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffc0cb,#ffe4ec);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:rgba(255,255,255,.35);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
max-width:600px;
width:90%;
}

h1{
font-size:55px;
color:#ff2d55;
margin-bottom:15px;
}

p{
font-size:20px;
color:#444;
margin:15px 0;
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff2d55;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">

<h1>❤️ Ela ❤️</h1>

<p>Bu sayfa sadece senin için hazırlandı...</p>

<p>💌 Sadece seni seviyorum. Kalbimde başka kimse yok.</p>


<button onclick="document.getElementById('surpriz').style.display='block'">
🎁 Mektubu Aç
</button>
<div id="surpriz" style="display:none; margin-top:30px;">

<img src="ela-cocukluk.jpg" alt="Ela'nın Çocukluğu" style="width:250px; max-width:90%; border-radius:20px;">

<p>
🌸 Bazen tek bir fotoğraf bile insanı geçmişe götürür.
Bu da o güzel anılardan biri... ❤️
</p>

</div>

</body>
</html>
